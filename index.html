<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生コン注文フォーム</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { display: none; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body style="margin:0;padding:0;">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    const MONTHS = Array.from({ length: 12 }, (_, i) => i + 1);
    const DAYS = Array.from({ length: 31 }, (_, i) => i + 1);
    const HOURS = Array.from({ length: 24 }, (_, i) => i);
    const MINUTES = [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55];
    const WEEKDAYS = ["日", "月", "火", "水", "木", "金", "土"];

    const SHIKEN_OPTIONS = [
      { id: "daiko", label: "現場代行" },
      { id: "daiko_shitei", label: "現場代行指定有" },
      { id: "enshun", label: "塩分含有量" },
      { id: "koji", label: "工場採取" },
      { id: "sonota", label: "その他" },
    ];

    const MIX_FIELDS = [
      { key: "mix1", placeholder: "21", hint: "呼び強度" },
      { key: "mix2", placeholder: "8",  hint: "スランプ" },
      { key: "mix3", placeholder: "25", hint: "骨材寸法" },
    ];

    const REQUIRED_FIELDS = [
      "name","tel","genba","month","day","hour","minute",
      "mix1","mix2","mix3","mixType","qty","qtyType","car"
    ];

    const STORAGE_KEY      = "concrete_order_history_v2";
    const DRAFT_KEY        = "concrete_order_draft_v2";
    const CLEAR_PROMPT_KEY = "concrete_show_clear_prompt";
    const LOG_KEY          = "concrete_order_log_v1";
    const CONTACTS_KEY     = "concrete_contacts_v2";

    const DEFAULT_CONTACTS = [
      { id: "default_1", name: "大坪",     lineId: "09095436156" },
      { id: "default_2", name: "魁誠",     lineId: "09050460670" },
      { id: "default_3", name: "金海生コン", lineId: "09034663605" },
    ];

    const defaultForm = () => ({
      name:"", tel:"", genba:"", address:"",
      month:"", day:"", weekday:"",
      hour:"", minute:"",
      mix1:"", mix2:"", mix3:"", mixType:"",
      qty:"", trucks:"", qtyType:"",
      car:"",
      keikakusho:"", shiken:"",
      shikenOptions:[], sonotaText:"",
    });

    function getDaysInMonth(month) {
      if (!month) return 31;
      const now = new Date();
      const currentMonth = now.getMonth() + 1;
      const year = Number(month) < currentMonth ? now.getFullYear() + 1 : now.getFullYear();
      return new Date(year, Number(month), 0).getDate();
    }

    function calcWeekday(month, day) {
      if (!month || !day) return "";
      const now = new Date();
      const cm = now.getMonth() + 1;
      const cd = now.getDate();
      const m = Number(month);
      const d = Number(day);
      const year =
        m < cm || (m === cm && d < cd)
          ? now.getFullYear() + 1
          : now.getFullYear();
      const date = new Date(year, m - 1, d);
      return isNaN(date) ? "" : WEEKDAYS[date.getDay()];
    }

    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
      catch { return []; }
    }
    function loadLog() {
      try { return JSON.parse(localStorage.getItem(LOG_KEY) || "[]"); }
      catch { return []; }
    }
    function loadContacts() {
      try { return JSON.parse(localStorage.getItem(CONTACTS_KEY) || "[]"); }
      catch { return []; }
    }
    function saveContacts(list) {
      try { localStorage.setItem(CONTACTS_KEY, JSON.stringify(list)); } catch {}
    }
    function saveLog(form, text) {
      try {
        const log = loadLog();
        const now = new Date();
        const entry = {
          ts: now.toISOString(),
          label: `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`,
          name: form.name, genba: form.genba,
          mix: `${form.mix1}-${form.mix2}-${form.mix3}(${form.mixType})`,
          qty: `${form.qty}㎥`, text,
        };
        localStorage.setItem(LOG_KEY, JSON.stringify([entry, ...log].slice(0, 30)));
      } catch {}
    }

    function saveHistory(form) {
      try {
        const hist = loadHistory();
        const entry = { name: form.name, tel: form.tel, genba: form.genba, address: form.address };
        const filtered = hist.filter(h => h.name !== entry.name || h.genba !== entry.genba);
        localStorage.setItem(STORAGE_KEY, JSON.stringify([entry, ...filtered].slice(0, 10)));
      } catch {}
    }

    const BASE_INPUT = {
      background: "#1e2023",
      border: "1.5px solid #35383d",
      borderRadius: "10px",
      padding: "10px 12px",
      color: "#f0f0f0",
      fontSize: "14px",
      width: "100%",
      outline: "none",
      fontFamily: "'Noto Sans JP', sans-serif",
      boxSizing: "border-box",
    };
    const ERR_INPUT = { borderColor: "#ef4444", background: "#2a1a1a" };
    const GREEN = "#06C755";

    function StyledInput({ value, onChange, placeholder, type = "text", error, style = {}, step, min, inputMode }) {
      const [focused, setFocused] = useState(false);
      return (
        <input
          style={{
            ...BASE_INPUT,
            ...(error ? ERR_INPUT : {}),
            ...(focused ? { borderColor: error ? "#ef4444" : GREEN } : {}),
            ...style,
          }}
          type={type}
          placeholder={placeholder}
          value={value}
          step={step}
          min={min}
          inputMode={inputMode}
          onChange={onChange}
          onFocus={() => setFocused(true)}
          onBlur={() => setFocused(false)}
        />
      );
    }

    function StyledSelect({ value, onChange, options, placeholder, error, style = {} }) {
      return (
        <div style={{ position: "relative" }}>
          <select
            style={{
              ...BASE_INPUT,
              ...(error ? ERR_INPUT : {}),
              cursor: "pointer",
              appearance: "none",
              paddingRight: "30px",
              ...style,
            }}
            value={value}
            onChange={onChange}
          >
            <option value="">{placeholder}</option>
            {options.map(o => (
              <option key={o.value ?? o} value={o.value ?? o}>{o.label ?? o}</option>
            ))}
          </select>
          <span style={{
            position: "absolute", right: "10px", top: "50%", transform: "translateY(-50%)",
            color: "#9ca3af", fontSize: "11px", pointerEvents: "none",
          }}>▼</span>
        </div>
      );
    }

    function Chip({ label, selected, onClick, error }) {
      return (
        <button
          onClick={onClick}
          style={{
            padding: "8px 16px",
            borderRadius: "999px",
            border: `2px solid ${selected ? GREEN : error ? "#ef4444" : "#35383d"}`,
            background: selected ? GREEN : "transparent",
            color: selected ? "#fff" : error ? "#ef4444" : "#9ca3af",
            fontWeight: 700,
            fontSize: "13px",
            cursor: "pointer",
            transition: "all 0.15s",
            fontFamily: "'Noto Sans JP', sans-serif",
            whiteSpace: "nowrap",
          }}
        >
          {label}
        </button>
      );
    }

    function Section({ icon, title, children }) {
      return (
        <div style={{ marginBottom: "20px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "14px" }}>
            <span style={{ fontSize: "18px" }}>{icon}</span>
            <span style={{ color: "#f0f0f0", fontWeight: 700, fontSize: "14px" }}>{title}</span>
            <div style={{ flex: 1, height: "1px", background: "#2a2d32" }} />
          </div>
          {children}
        </div>
      );
    }

    function Label({ text, required, error }) {
      return (
        <div style={{ marginBottom: "5px", display: "flex", alignItems: "center", gap: "6px" }}>
          <span style={{ color: error ? "#ef4444" : GREEN, fontSize: "11px", fontWeight: 700, letterSpacing: "1px" }}>
            {text}
          </span>
          {required && <span style={{ color: "#ef4444", fontSize: "10px" }}>必須</span>}
          {error && <span style={{ color: "#ef4444", fontSize: "11px" }}>⚠ 未入力</span>}
        </div>
      );
    }

    function ConcreteOrderForm() {
      const [form, setForm] = useState(defaultForm());
      const [copied, setCopied] = useState(false);
      const [errors, setErrors] = useState({});
      const [history, setHistory] = useState([]);
      const [showHistory, setShowHistory] = useState(false);
      const [showPreview, setShowPreview] = useState(false);
      const [sent, setSent] = useState(false);
      const [sending, setSending] = useState(false);
      const [showClearPrompt, setShowClearPrompt] = useState(false);
      const [showConfirm, setShowConfirm] = useState(false);
      const [showResetConfirm, setShowResetConfirm] = useState(false);
      const [showLogDeleteConfirm, setShowLogDeleteConfirm] = useState(false);
      const [showLog, setShowLog] = useState(false);
      const [sendLog, setSendLog] = useState([]);
      const [contacts, setContacts] = useState([]);
      const [selectedContactId, setSelectedContactId] = useState("");
      const [showContactsModal, setShowContactsModal] = useState(false);
      const [newContactName, setNewContactName] = useState("");
      const [newContactLineId, setNewContactLineId] = useState("");
      const [contactErrors, setContactErrors] = useState({});
      const getPreviewTime = () => {
        const now = new Date();
        return `${now.getHours()}:${String(now.getMinutes()).padStart(2, "0")}`;
      };
      const previewTime = showPreview ? getPreviewTime() : "";

      useEffect(() => {
        setHistory(loadHistory());
        setSendLog(loadLog());
        const savedContacts = loadContacts();
        if (savedContacts.length === 0) {
          setContacts(DEFAULT_CONTACTS);
          saveContacts(DEFAULT_CONTACTS);
        } else {
          setContacts(savedContacts);
        }
        try {
          const savedDraft = JSON.parse(localStorage.getItem(DRAFT_KEY));
          if (savedDraft) setForm(savedDraft);
        } catch {}
        if (localStorage.getItem(CLEAR_PROMPT_KEY) === "true") {
          setShowClearPrompt(true);
          localStorage.removeItem(CLEAR_PROMPT_KEY);
        }
      }, []);

      useEffect(() => {
        try { localStorage.setItem(DRAFT_KEY, JSON.stringify(form)); } catch {}
      }, [form]);

      const set = useCallback((key, val) => {
        setForm(f => {
          const next = { ...f, [key]: val };
          if (key === "month") {
            const maxDay = getDaysInMonth(val);
            if (f.day && Number(f.day) > maxDay) {
              next.day = "";
              next.weekday = "";
            } else {
              next.weekday = calcWeekday(val, f.day);
            }
          } else if (key === "day") {
            next.weekday = calcWeekday(f.month, val);
          }
          return next;
        });
        setErrors(e => ({ ...e, [key]: false }));
        setSent(false);
      }, []);

      const toggleShikenOpt = useCallback((id) => {
        setForm(f => {
          const opts = f.shikenOptions.includes(id)
            ? f.shikenOptions.filter(o => o !== id)
            : [...f.shikenOptions, id];
          return { ...f, shikenOptions: opts };
        });
        setSent(false);
      }, []);

      const applyHistory = useCallback((entry) => {
        setForm(f => ({ ...f, name: entry.name, tel: entry.tel, genba: entry.genba, address: entry.address || "" }));
        setShowHistory(false);
        setSent(false);
      }, []);

      const handleReset = useCallback(() => {
        setForm(defaultForm());
        setErrors({});
        setSent(false);
        setShowClearPrompt(false);
        try { localStorage.removeItem(DRAFT_KEY); } catch {}
        window.scrollTo({ top: 0, behavior: "smooth" });
      }, []);

      const validate = useCallback(() => {
        const errs = {};
        REQUIRED_FIELDS.forEach(k => { if (!form[k] && form[k] !== 0) errs[k] = true; });
        const tel = form.tel || "";
        if (!tel.trim() || !/^[\d\-+() ]+$/.test(tel.trim())) errs.tel = true;
        setErrors(errs);
        return Object.keys(errs).length === 0;
      }, [form]);

      const buildText = () => {
        const shikenLabel = form.shiken === "有"
          ? `有 (${form.shikenOptions.map(id => {
              if (id === "sonota") return `その他: ${form.sonotaText}`;
              return SHIKEN_OPTIONS.find(o => o.id === id)?.label ?? id;
            }).join(" / ")})`
          : form.shiken || "－";

        const hh = form.hour !== "" ? String(form.hour).padStart(2, "0") : "　";
        const mm = form.minute !== "" ? String(form.minute).padStart(2, "0") : "　";
        const trucks = form.trucks ? `　${form.trucks}台` : "";

        return `👷【施工者名】${form.name || "－"}
📞【連絡先】${form.tel || "－"}
🚧【現場名】${form.genba || "－"}${form.address ? `\n📍【住所】${form.address}` : ""}
📅【施工日時】${form.month || "　"}月${form.day || "　"}日(${form.weekday || "　"}) ${hh}時${mm}分
🧱【配合】${form.mix1 || "　"}ー${form.mix2 || "　"}ー${form.mix3 || "　"}（${form.mixType || "　"}）
📦【数量】${form.qty || "　"}㎥${trucks}（${form.qtyType || "　"}）
🚚【車種】${form.car || "－"}
📋【書類・試験】
　配合計画書：${form.keikakusho || "－"}
　試験：${shikenLabel}`;
      };

      const text = useMemo(buildText, [form]);

      const handleCopy = useCallback(() => {
        if (!validate()) return;
        const doCopy = () => {
          if (navigator.clipboard && window.isSecureContext) {
            return navigator.clipboard.writeText(text);
          }
          const el = document.createElement("textarea");
          el.value = text;
          el.style.position = "fixed";
          el.style.opacity = "0";
          document.body.appendChild(el);
          el.select();
          document.execCommand("copy");
          document.body.removeChild(el);
          return Promise.resolve();
        };
        doCopy().then(() => {
          setCopied(true);
          saveHistory(form);
          setHistory(loadHistory());
          setTimeout(() => setCopied(false), 2500);
        });
      }, [validate, text, form]);

      const handleLine = useCallback(() => {
        if (!validate()) return;
        setShowConfirm(true);
      }, [validate]);

      const handleConfirmSend = useCallback(() => {
        if (sending) return;
        setShowConfirm(false);
        saveHistory(form);
        saveLog(form, text);
        setHistory(loadHistory());
        setSendLog(loadLog());
        setSent(true);
        setSending(true);
        setShowClearPrompt(true);
        localStorage.setItem(CLEAR_PROMPT_KEY, "true");
        const contact = contacts.find(c => c.id === selectedContactId);
        if (contact && contact.lineId) {
          const doCopy = () => {
            if (navigator.clipboard && window.isSecureContext) {
              return navigator.clipboard.writeText(text).catch(() => {});
            }
            const el = document.createElement("textarea");
            el.value = text;
            el.style.position = "fixed";
            el.style.opacity = "0";
            document.body.appendChild(el);
            el.select();
            document.execCommand("copy");
            document.body.removeChild(el);
          };
          doCopy();
          const val = contact.lineId.trim();
          let lineUrl;
          if (val.startsWith("https://line.me/ti/g/")) {
            const groupId = val.replace("https://line.me/ti/g/", "").split("?")[0];
            lineUrl = `line://ti/g/${groupId}`;
          } else if (val.startsWith("line://ti/g/")) {
            lineUrl = val;
          } else {
            const digits = val.replace(/[-\s]/g, "");
            let phone = null;
            if (digits.startsWith("+") && /^\+\d{7,15}$/.test(digits)) {
              phone = digits;
            } else if (digits.startsWith("0") && /^\d{10,11}$/.test(digits)) {
              phone = "+81" + digits.slice(1);
            }
            if (phone) {
              lineUrl = `line://ti/p/${encodeURIComponent(phone)}`;
            } else {
              lineUrl = `line://ti/p/${val}`;
            }
          }
          window.open(lineUrl, "_blank");
        } else {
          window.open(`https://line.me/R/msg/text/?${encodeURIComponent(text)}`, "_blank");
        }
        setTimeout(() => setSending(false), 3000);
      }, [form, text, sending, contacts, selectedContactId]);

      const availableDays = useMemo(
        () => Array.from({ length: getDaysInMonth(form.month) }, (_, i) => i + 1),
        [form.month]
      );

      const missingCount = useMemo(
        () => REQUIRED_FIELDS.filter(k => !form[k] && form[k] !== 0).length,
        [form]
      );
      const isComplete = missingCount === 0;

      return (
        <div style={{ fontFamily: "'Noto Sans JP', sans-serif", background: "#13151a", minHeight: "100vh", paddingBottom: "40px" }}>
          <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet" />

          <div style={{
            background: `linear-gradient(135deg, ${GREEN} 0%, #00a344 100%)`,
            padding: "14px 16px",
            display: "flex", alignItems: "center", justifyContent: "space-between",
            position: "sticky", top: 0, zIndex: 100,
            boxShadow: "0 2px 20px rgba(6,199,85,0.3)",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
              <span style={{ fontSize: "20px" }}>🏗️</span>
              <span style={{ color: "white", fontWeight: 900, fontSize: "15px", letterSpacing: "1px" }}>生コン注文フォーム</span>
            </div>
            <div style={{ display: "flex", gap: "6px" }}>
              {sendLog.length > 0 && (
                <button onClick={() => setShowLog(v => !v)} style={{
                  background: "rgba(255,255,255,0.2)", border: "none", borderRadius: "8px",
                  color: "white", fontSize: "11px", fontWeight: 700, padding: "6px 10px", cursor: "pointer",
                  fontFamily: "'Noto Sans JP', sans-serif",
                }}>📨 送信ログ</button>
              )}
              {history.length > 0 && (
                <button onClick={() => setShowHistory(v => !v)} style={{
                  background: "rgba(255,255,255,0.2)", border: "none", borderRadius: "8px",
                  color: "white", fontSize: "11px", fontWeight: 700, padding: "6px 10px", cursor: "pointer",
                  fontFamily: "'Noto Sans JP', sans-serif",
                }}>📋 履歴</button>
              )}
              <button onClick={() => setShowResetConfirm(true)} style={{
                background: "rgba(255,255,255,0.2)", border: "none", borderRadius: "8px",
                color: "white", fontSize: "11px", fontWeight: 700, padding: "6px 10px", cursor: "pointer",
                fontFamily: "'Noto Sans JP', sans-serif",
              }}>🔄 クリア</button>
            </div>
          </div>

          <div style={{ background: "#1e2023", height: "4px" }}>
            <div style={{
              height: "100%",
              width: `${((REQUIRED_FIELDS.length - missingCount) / REQUIRED_FIELDS.length) * 100}%`,
              background: isComplete ? GREEN : "#f59e0b",
              transition: "width 0.4s ease",
            }} />
          </div>

          {showLog && sendLog.length > 0 && (
            <div style={{
              margin: "8px 16px", background: "#1e2023",
              border: "1px solid #35383d", borderRadius: "12px", overflow: "hidden",
              boxShadow: "0 8px 24px rgba(0,0,0,0.5)",
            }}>
              <div style={{ padding: "10px 14px", color: "#9ca3af", fontSize: "11px", fontWeight: 700, borderBottom: "1px solid #2a2d32", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span>📨 送信ログ（最新{sendLog.length}件）</span>
                <button onClick={() => setShowLogDeleteConfirm(true)} style={{ background: "transparent", border: "none", color: "#ef4444", fontSize: "11px", fontWeight: 700, cursor: "pointer", fontFamily: "'Noto Sans JP', sans-serif" }}>削除</button>
              </div>
              {sendLog.map((log, i) => (
                <div key={i} style={{
                  padding: "10px 14px",
                  borderBottom: i < sendLog.length - 1 ? "1px solid #1a1c20" : "none",
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ color: GREEN, fontSize: "11px", fontWeight: 700 }}>{log.label}</span>
                    <span style={{ color: "#6b7280", fontSize: "11px" }}>{log.mix} / {log.qty}</span>
                  </div>
                  <div style={{ color: "#e0e0e0", fontSize: "12px", marginTop: "2px" }}>🚧 {log.genba}　👷 {log.name}</div>
                </div>
              ))}
            </div>
          )}

          {showHistory && history.length > 0 && (
            <div style={{
              margin: "8px 16px", background: "#1e2023",
              border: "1px solid #35383d", borderRadius: "12px", overflow: "hidden",
              boxShadow: "0 8px 24px rgba(0,0,0,0.5)",
            }}>
              <div style={{ padding: "10px 14px", color: "#9ca3af", fontSize: "11px", fontWeight: 700, borderBottom: "1px solid #2a2d32" }}>
                📋 最近の注文から入力
              </div>
              {history.map((h, i) => (
                <button key={i} onClick={() => applyHistory(h)} style={{
                  width: "100%", padding: "10px 14px", background: "transparent",
                  border: "none", borderBottom: i < history.length - 1 ? "1px solid #1a1c20" : "none",
                  color: "#e0e0e0", textAlign: "left", cursor: "pointer",
                  fontFamily: "'Noto Sans JP', sans-serif",
                }}>
                  <div style={{ fontWeight: 700, fontSize: "13px" }}>👷 {h.name}</div>
                  <div style={{ color: "#9ca3af", fontSize: "11px", marginTop: "2px" }}>🚧 {h.genba}　📞 {h.tel}</div>
                </button>
              ))}
            </div>
          )}

          <div style={{ maxWidth: "480px", margin: "0 auto", padding: "16px" }}>

            {Object.values(errors).filter(Boolean).length > 0 && (
              <div style={{
                background: "#2a1a1a", border: "1px solid #ef4444",
                borderRadius: "10px", padding: "12px 14px", marginBottom: "16px",
              }}>
                <span style={{ color: "#ef4444", fontWeight: 700, fontSize: "13px" }}>
                  ⚠ {Object.values(errors).filter(Boolean).length}項目が未入力です。確認してください。
                </span>
              </div>
            )}

            <Section icon="👷" title="基本情報">
              <div style={{ marginBottom: "12px" }}>
                <Label text="施工者名" required error={errors.name} />
                <StyledInput value={form.name} onChange={e => set("name", e.target.value)} placeholder="例）〇〇建設・〇〇興業" error={errors.name} />
              </div>
              <div style={{ marginBottom: "12px" }}>
                <Label text="連絡先（電話番号）" required error={errors.tel} />

              </div>
            )}

            <button onClick={handleLine} disabled={sending} style={{
              width: "100%", padding: "16px", borderRadius: "14px", border: "none",
              background: isComplete && !sending ? `linear-gradient(135deg, ${GREEN} 0%, #00a344 100%)` : "#1e2023",
              color: isComplete && !sending ? "#fff" : "#555",
              fontWeight: 900, fontSize: "16px", letterSpacing: "2px",
              cursor: isComplete && !sending ? "pointer" : "not-allowed",
              transition: "all 0.3s",
              boxShadow: isComplete && !sending ? "0 4px 24px rgba(6,199,85,0.4)" : "none",
              display: "flex", alignItems: "center", justifyContent: "center", gap: "10px",
              marginBottom: "10px",
              fontFamily: "'Noto Sans JP', sans-serif",
              opacity: sending ? 0.6 : 1,
            }}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill={isComplete && !sending ? "white" : "#555"}>
                <path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/>
              </svg>
              {sending ? "⏳ 送信中..." : sent ? "✅ 送信済み！再送する" : contacts.find(c => c.id === selectedContactId) ? `${contacts.find(c => c.id === selectedContactId).name} にLINEで送る` : "LINEで送る"}
            </button>

            {showClearPrompt && (
              <div style={{
                position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 200,
                background: "#1a2a1a", borderTop: `2px solid ${GREEN}`,
                padding: "16px 20px",
                display: "flex", alignItems: "center", justifyContent: "space-between", gap: "12px",
                boxShadow: "0 -4px 24px rgba(6,199,85,0.3)",
              }}>
                <span style={{ color: "#e0e0e0", fontSize: "14px", fontWeight: 700 }}>
                  📨 送信完了！フォームをクリアしますか？
                </span>
                <div style={{ display: "flex", gap: "8px", flexShrink: 0 }}>
                  <button onClick={handleReset} style={{
                    background: GREEN, border: "none", borderRadius: "8px",
                    color: "white", fontSize: "13px", fontWeight: 700,
                    padding: "8px 16px", cursor: "pointer",
                    fontFamily: "'Noto Sans JP', sans-serif",
                  }}>クリア</button>
                  <button onClick={() => { setShowClearPrompt(false); localStorage.removeItem(CLEAR_PROMPT_KEY); }} style={{
                    background: "transparent", border: "1px solid #555", borderRadius: "8px",
                    color: "#9ca3af", fontSize: "13px", fontWeight: 700,
                    padding: "8px 16px", cursor: "pointer",
                    fontFamily: "'Noto Sans JP', sans-serif",
                  }}>そのまま</button>
                </div>
              </div>
            )}

            <button onClick={handleCopy} style={{
              width: "100%", padding: "12px", borderRadius: "12px",
              border: `2px solid ${copied ? GREEN : "#2a2d32"}`,
              background: "transparent",
              color: copied ? GREEN : "#6b7280",
              fontWeight: 700, fontSize: "13px", letterSpacing: "1px",
              cursor: "pointer", transition: "all 0.2s",
              fontFamily: "'Noto Sans JP', sans-serif",
            }}>
              {copied ? "✅ コピーしました！" : "📋 テキストをコピーする（メール等）"}
            </button>

            <div style={{ textAlign: "center", color: "#374151", fontSize: "11px", marginTop: "16px" }}>
              © 金海興業
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ConcreteOrderForm />);
  </script>
</body>
</html>
